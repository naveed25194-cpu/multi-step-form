<!DOCTYPE html>
<html>
<head>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
    }

    form {
        background-color: white;
        width: 400px;
        margin: auto;
        padding: 20px;
        border: 2px solid #ccc;
        border-radius: 10px;
    }

    input, textarea {
        width: 90%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button, input[type="submit"] {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
    }

    button:hover, input[type="submit"]:hover {
        background-color: #45a049;
    }

    h1 {
        text-align: center;
    }
    </style>
    <title>Multi-Step Form</title>
</head>
<body>

<h1>Multi-Step Form</h1>
<p>Fill in the information below.</p>

<form id="stepForm">
     <div id="step1">
        <h2>Step 1: Personal Information</h2>
        <label>Full Name:</label>
        <input type="text" name="fullname" required><br><br>

        <label>Email:</label>
        <input type="email" name="email" required><br><br>

        <button type="button" onclick="nextStep(2)">Next</button>
    </div>
        <div id="step2" style="display:none;">
        <h2>Step 2: Address Information</h2>
        <label>City:</label>
        <input type="text" name="city" required><br><br>

        <label>Postal Code:</label>
        <input type="text" name="postalcode" required><br><br>

        <button type="button" onclick="nextStep(1)">Previous</button>
        <button type="button" onclick="nextStep(3)">Next</button>
    </div>
        <div id="step3" style="display:none;">
        <h2>Step 3: Additional Information</h2>
        <label>Phone Number:</label>
        <input type="text" name="phone" required><br><br>

        <label>Message:</label><br>
        <textarea name="message" rows="4" cols="30"></textarea><br><br>

        <button type="button" onclick="nextStep(2)">Previous</button>
        <input type="submit" value="Submit">
    </div>

</form>

</body>
<script>
    function nextStep(step) {
        // Hide all steps
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "none";

        // Show the selected step
        document.getElementById("step" + step).style.display = "block";
    }
</script>
</html>
